# ============================================================
# Arcan Gods — Docker Compose (Desenvolvimento)
# Com hot-reload via volumes montados
# ============================================================
# Uso: docker compose -f docker-compose.dev.yml up

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: arcan-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: arcan_gods
      POSTGRES_USER: arcan
      POSTGRES_PASSWORD: arcan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcan -d arcan_gods"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arcan-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile.dev
    container_name: arcan-server-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      SERVER_PORT: 3001
      WS_PORT: 3001
      DATABASE_URL: postgresql://arcan:arcan@postgres:5432/arcan_gods
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-not-for-production
      JWT_EXPIRES_IN: 24h
      TICK_RATE: 100
    volumes:
      - ./packages/server/src:/app/packages/server/src:ro
      - ./packages/shared/src:/app/packages/shared/src:ro
      - ./packages/server/package.json:/app/packages/server/package.json:ro
      - ./package.json:/app/package.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile.dev
    container_name: arcan-client-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      VITE_WS_URL: ws://localhost:3001
    volumes:
      - ./packages/client/src:/app/packages/client/src:ro
      - ./packages/client/public:/app/packages/client/public:ro
      - ./packages/client/index.html:/app/packages/client/index.html:ro
      - ./packages/client/vite.config.ts:/app/packages/client/vite.config.ts:ro
      - ./packages/client/package.json:/app/packages/client/package.json:ro
      - ./packages/shared/src:/app/packages/shared/src:ro
      - ./package.json:/app/package.json:ro
    depends_on:
      - server

volumes:
  postgres_data_dev:
  redis_data_dev:
